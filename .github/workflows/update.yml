name: Actualizar RSS

on:
  schedule:
    - cron: "0 9 * * *"   # 6 AM Argentina (9 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install yt-dlp

      - name: Ejecutar scraping
        run: python scrape.py

      - name: Generar archivos
        run: python build.py

      - name: Commit y push
        run: |
          git config user.name "RSS Bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Actualizacion automatica $(date -u +%Y-%m-%d)"
          git push
